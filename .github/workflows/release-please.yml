name: Release Please

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-chrome:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

      - name: Build and zip Meta variant
        run: pnpm zip:meta:ci

      - name: Locate Chrome zip
        id: zip
        run: |
          ZIP_PATH=$(ls .output/*-chrome.zip | head -n 1)
          if [ -z "$ZIP_PATH" ]; then
            echo "No Chrome zip found in .output/"
            exit 1
          fi
          echo "path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "Found: $ZIP_PATH"

      - name: Submit to Chrome Web Store (Meta)
        run: pnpm exec wxt submit --chrome-zip "${{ steps.zip.outputs.path }}"
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_META_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}

      - name: Attach zip to GitHub Release
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" "${{ steps.zip.outputs.path }}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
