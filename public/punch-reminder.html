<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #140e1e;
    color: #e8eaf0;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }
  .card {
    text-align: center;
    padding: 24px 28px;
    max-width: 380px;
    width: 100%;
  }
  .icon {
    font-size: 40px;
    margin-bottom: 10px;
  }
  h1 {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 8px;
    color: #fbbf24;
  }
  .msg {
    font-size: 13px;
    color: #9da7b8;
    line-height: 1.5;
    margin-bottom: 18px;
  }
  .msg strong {
    color: #fbbf24;
    font-weight: 700;
  }
  .actions {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .actions.escalated {
    flex-direction: column;
  }
  button {
    padding: 9px 16px;
    border-radius: 8px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button:hover { opacity: 0.85; }
  .btn-primary {
    background: #9d7bf0;
    color: #140e1e;
  }
  .btn-secondary {
    background: #334155;
    color: #e8eaf0;
  }
  .btn-tertiary {
    background: transparent;
    color: #9da7b8;
    border: 1px solid #334155;
  }
  .snooze {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid #2a3142;
  }
  .snooze-label {
    font-size: 11px;
    color: #6b7280;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .snooze-row {
    display: flex;
    gap: 6px;
    justify-content: center;
  }
  .btn-snooze {
    flex: 1;
    background: transparent;
    color: #cbd5e1;
    border: 1px solid #334155;
    padding: 7px 10px;
    font-size: 12px;
  }
  .btn-snooze:hover {
    background: #2a3142;
    opacity: 1;
  }
  /* Escalated mode: warning color */
  body.escalated h1 { color: #e0558f; }
  body.escalated .icon { font-size: 36px; }
</style>
</head>
<body>
  <div class="card">
    <div class="icon" id="icon"></div>
    <h1 id="title"></h1>
    <p class="msg" id="msg"></p>
    <div class="actions" id="actions"></div>
    <div class="snooze" id="snooze" style="display:none">
      <div class="snooze-label">Lembrar daqui</div>
      <div class="snooze-row" id="snooze-row"></div>
    </div>
  </div>
  <script src="punch-reminder.js"></script>
</body>
</html>
