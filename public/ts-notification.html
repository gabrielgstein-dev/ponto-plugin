<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1e2e;
    color: #e8eaf0;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }
  .card {
    text-align: center;
    padding: 32px 28px;
    max-width: 380px;
    width: 100%;
  }
  .icon {
    font-size: 48px;
    margin-bottom: 16px;
  }
  h1 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
    color: #fbbf24;
  }
  .msg {
    font-size: 14px;
    color: #9da7b8;
    line-height: 1.5;
    margin-bottom: 24px;
  }
  .msg strong {
    color: #fbbf24;
    font-weight: 700;
  }
  .actions {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  button {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button:hover { opacity: 0.85; }
  .btn-primary {
    background: #4ade80;
    color: #1a1e2e;
  }
  .btn-secondary {
    background: transparent;
    color: #9da7b8;
    border: 1px solid #2a2f40;
  }
  .btn-secondary:hover {
    border-color: #9da7b8;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">📋</div>
    <h1>Apontamentos Pendentes</h1>
    <p class="msg" id="msg"></p>
    <div class="actions">
      <button class="btn-primary" id="btnOk">Entendi, obrigado!</button>
    </div>
  </div>
  <script src="ts-notification.js"></script>
</body>
</html>
