<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0a0d;
    color: #f3e8eb;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .aurora, .shimmer {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .aurora {
    background: conic-gradient(
      from 0deg at 30% 50%,
      rgba(249, 115, 22, 0.55),
      rgba(236, 72, 153, 0.45),
      rgba(139, 92, 246, 0.4),
      rgba(34, 211, 238, 0.4),
      rgba(249, 115, 22, 0.55)
    );
    filter: blur(60px);
    opacity: 0.45;
    animation: aurora 10s linear infinite;
  }
  .shimmer {
    background: linear-gradient(
      115deg,
      transparent 0%,
      transparent 38%,
      rgba(255, 255, 255, 0.12) 50%,
      transparent 62%,
      transparent 100%
    );
    background-size: 220% 100%;
    animation: shimmer 4s ease-in-out infinite;
  }
  @keyframes aurora {
    0% { transform: rotate(0deg) scale(1.6); }
    100% { transform: rotate(360deg) scale(1.6); }
  }
  @keyframes shimmer {
    0% { background-position: 220% 50%; }
    100% { background-position: -120% 50%; }
  }
  .card {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 28px 32px;
    max-width: 420px;
    width: 100%;
    background: rgba(15, 10, 13, 0.6);
    border: 1px solid rgba(249, 115, 22, 0.35);
    border-radius: 16px;
    backdrop-filter: blur(12px);
    box-shadow:
      0 0 0 1px rgba(239, 68, 68, 0.35),
      0 0 32px rgba(249, 115, 22, 0.35),
      0 12px 40px rgba(0, 0, 0, 0.4);
    animation: glow 2.4s ease-in-out infinite;
  }
  @keyframes glow {
    0%, 100% {
      box-shadow:
        0 0 0 1px rgba(239, 68, 68, 0.35),
        0 0 32px rgba(249, 115, 22, 0.35),
        0 12px 40px rgba(0, 0, 0, 0.4);
    }
    50% {
      box-shadow:
        0 0 0 1px rgba(239, 68, 68, 0.6),
        0 0 50px rgba(249, 115, 22, 0.55),
        0 12px 40px rgba(0, 0, 0, 0.4);
    }
  }
  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #fda4af;
    background: rgba(239, 68, 68, 0.15);
    border: 1px solid rgba(239, 68, 68, 0.4);
    border-radius: 999px;
    padding: 4px 10px;
    margin-bottom: 14px;
  }
  h1 {
    font-size: 22px;
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #fbbf24, #fb923c, #f43f5e);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .msg {
    font-size: 14px;
    color: #d1c3c8;
    line-height: 1.5;
    margin-bottom: 22px;
  }
  .msg strong { color: #fde68a; font-weight: 700; }
  .actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  button {
    padding: 11px 16px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, filter 0.15s;
    font-family: inherit;
  }
  button:hover { filter: brightness(1.1); }
  button:active { transform: translateY(1px); }
  .btn-primary {
    background: linear-gradient(135deg, #f97316, #ef4444);
    color: #ffffff;
    box-shadow: 0 4px 16px rgba(239, 68, 68, 0.35);
  }
  .btn-secondary {
    background: rgba(34, 197, 94, 0.18);
    color: #86efac;
    border: 1px solid rgba(34, 197, 94, 0.45);
  }
  .btn-ghost {
    background: transparent;
    color: #9ca3af;
    border: 1px solid rgba(156, 163, 175, 0.3);
  }
  .ctx-hint {
    margin-top: 14px;
    font-size: 11px;
    color: #9ca3af;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  @media (prefers-reduced-motion: reduce) {
    .aurora, .shimmer, .card { animation: none; }
  }
</style>
</head>
<body>
  <div class="aurora" aria-hidden="true"></div>
  <div class="shimmer" aria-hidden="true"></div>
  <div class="card">
    <span class="badge" id="badge">Quarta · Meta X</span>
    <h1 id="title">Hora da Meta X</h1>
    <p class="msg" id="msg"></p>
    <div class="actions">
      <button class="btn-primary" id="btn-respond">Responder agora</button>
      <button class="btn-ghost" id="btn-snooze">Lembrar em 30min</button>
    </div>
    <div class="ctx-hint" id="ctx-hint"></div>
  </div>
  <script src="meta-x-reminder.js"></script>
</body>
</html>
